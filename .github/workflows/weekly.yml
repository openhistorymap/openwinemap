name: weekly harvest & deploy

on:
  schedule:
    # Sundays 02:00 UTC — quiet hours for Overpass and WDQS.
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: openwinemap-deploy
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3"
          cache: pip
          cache-dependency-path: harvester/requirements.txt

      - name: Install deps
        run: pip install -r harvester/requirements.txt

      - name: Run harvester
        run: python -m harvester

      - name: Commit data changes
        run: |
          git config user.name "openwinemap-bot"
          git config user.email "openwinemap-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes."
          else
            git commit -m "data: weekly refresh $(date -u +%Y-%m-%d)"
            git push
          fi

  deploy:
    needs: [harvest]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Stage site
        run: |
          mkdir -p _site/data
          cp -r web/. _site/
          if [ -d data ]; then cp -r data/. _site/data/; fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
